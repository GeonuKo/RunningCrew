<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도림천 러닝 크루</title>
    <style>
        /* 기본 레이아웃 */
        body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.6; color: #333; background-color: #f0f2f5; }
        .container { display: flex; min-height: 100vh; flex-direction: row; }
        
        /* 사이드바 */
        .sidebar { width: 240px; background-color: #2c3e50; color: white; padding: 25px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.4em; border-bottom: 2px solid #34495e; padding-bottom: 15px; margin-bottom: 20px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin-bottom: 10px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; font-weight: 600; display: block; padding: 12px 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { background-color: #34495e; color: white; }

        /* 메인 콘텐츠 */
        .content { flex: 1; padding: 40px; background-color: #ffffff; min-width: 0; }
        h2 { font-size: 2em; color: #2c3e50; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; border-left: 6px solid #2c3e50; padding-left: 15px; }
        .box { background: #f8f9fa; padding: 25px; border-radius: 15px; border: 1px solid #e9ecef; margin-bottom: 30px; }
        
        /* 투표 시스템 스타일 */
        .best-day { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 1.1em; color: #856404; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
        .date-item { background: white; border: 2px solid #eee; padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; min-height: 100px; display: flex; flex-direction: column; }
        .date-item.selected { border-color: #2c3e50; background-color: #e9ecef; }
        .date-item .date-label { font-weight: bold; font-size: 1em; margin-bottom: 5px; }
        .date-item .count { display: block; font-size: 1.1em; color: #2c3e50; font-weight: bold; margin-bottom: 8px; }
        .date-item .voter-list { font-size: 0.75em; color: #666; line-height: 1.3; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; }
        .input-group button { padding: 12px 25px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .info-text { font-size: 0.85em; color: #666; margin-bottom: 15px; line-height: 1.4; }

        /* 확정 참석 태그 */
        .name-tag { background: #e2e8f0; padding: 6px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
        .tag-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }

        /* 갤러리 스타일 */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .gallery-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; aspect-ratio: 1 / 1; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; font-size: 14px; }
        
        .upload-area { border: 3px dashed #cbd5e0; padding: 30px; text-align: center; border-radius: 20px; background: #edf2f7; margin-bottom: 30px; }
        .upload-label { background: #2c3e50; color: white; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; display: inline-block; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .sidebar ul { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
            .sidebar li { margin-bottom: 0; flex-shrink: 0; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>RUN CREW</h2>
            <ul>
                <li><a onclick="showCourse()">🗺️ 러닝 코스</a></li>
                <li><a onclick="showFood()">🍲 맛집 리스트</a></li>
                <li><a onclick="showLog()">📖 러닝 일지</a></li>
                <li><a onclick="showSchedule()">📅 스케줄 투표</a></li>
                <li><a onclick="showGallery()">📸 갤러리</a></li>
            </ul>
        </div>

        <div id="content" class="content">
            <h1>🏃‍♂️ 도림천 러닝 크루 관리 시스템</h1>
            <p>환영합니다! 왼쪽 메뉴를 클릭하여 크루 활동을 확인하세요.</p>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const DB_BASE = "https://dorim-run-crew-default-rtdb.firebaseio.com";
        
        // 1. 엔드포인트 설정 (logs 추가 확인)
        const ENDPOINTS = {
            schedule: `${DB_BASE}/schedule.json`,
            fixed: `${DB_BASE}/fixed_attendance.json`,
            gallery: `${DB_BASE}/gallery.json`,
            logs: `${DB_BASE}/running_logs.json`
        };

        let selectedDates = [];

        // --- 1. 러닝 코스 ---
        function showCourse() {
            const courses = [
                { title: "도림천 비단길 코스", dist: "6.0km", station: "신림역 ↔ 신도림역", desc: "경사가 거의 없고 길이 잘 닦여 있어 초보자에게 최적입니다.", link: "https://search.naver.com/search.naver?query=%EB%8F%84%EB%A6%BC%EC%B2%9C+%EB%9F%AC%EB%8B%9D+%EC%BD%94%EC%8A%A4" },
                { title: "여의도 고구마런 코스", dist: "8.4km", station: "여의나루역 순환", desc: "한강뷰와 빌딩숲을 동시에 즐기는 서울의 상징적인 코스입니다.", link: "https://search.naver.com/search.naver?query=%EC%97%AC%EC%9D%98%EB%8F%84+%EA%B3%A0%EA%B5%AC%EB%A7%88%EB%9F%B0" },
                { title: "반포~잠수교 루프 코스", dist: "4.5km", station: "고속터미널역 ↔ 잠수교", desc: "잠수교의 경사도와 무지개 분수 야경을 즐길 수 있는 낭만 코스입니다.", link: "https://search.naver.com/search.naver?query=%EC%9E%A1%EC%88%98%EA%B5%90+%EB%9F%AC%EB%8B%9D+%EC%BD%94%EC%8A%A4" }
            ];

            let html = `<h2>🗺️ 추천 러닝 코스</h2>`;
            courses.forEach(c => {
                html += `
                    <div class="box">
                        <h3 style="font-size: 1.4em; margin-bottom: 10px;">${c.title}</h3>
                        <p><strong>📏 거리:</strong> ${c.dist} / <strong>🚉 역:</strong> ${c.station}</p>
                        <p>${c.desc}</p>
                        <a href="${c.link}" target="_blank" style="color: #2c3e50; font-weight: bold;">상세 정보</a>
                    </div>
                `;
            });
            contentDiv.innerHTML = html;
        }

        // --- 2. 맛집 리스트 (여의도/노량진 수정 반영) ---
        function showFood() {
            const restaurants = [
                { name: "취복루", menu: "꿔바로우, 양꼬치", addr: "서울 동작구 등용로 118 (노량진-대방 사이)", desc: "현지 감성 중식 맛집!", link: "https://map.naver.com/p/entry/place/21651765" },
                { name: "농부와 닭동네", menu: "치킨, 닭매운탕", addr: "서울 영등포구 여의대방로 394 (여의도)", desc: "여의도 러너들의 성지!", link: "https://map.naver.com/p/entry/place/18578676" },
                { name: "기절초풍왕순대", menu: "순대국", addr: "서울 관악구 봉천로62길 2", desc: "낙성대 명물 막창순대!", link: "https://map.naver.com/p/entry/place/18709584" }
            ];

            let html = `<h2>🍲 크루 추천 맛집</h2>`;
            restaurants.forEach(r => {
                html += `
                    <div class="box">
                        <h3 style="font-size: 1.5em; color: #2c3e50;">${r.name}</h3>
                        <p><strong>🍴 메뉴:</strong> ${r.menu} / <strong>📍 주소:</strong> ${r.addr}</p>
                        <p>${r.desc}</p>
                        <a href="${r.link}" target="_blank" style="color:#03c75a; font-weight:bold;">네이버 지도</a>
                    </div>
                `;
            });
            contentDiv.innerHTML = html;
        }

        // --- 3. 러닝 일지 (실시간 게시판) ---
        function showLog() {
            contentDiv.innerHTML = `
                <h2>📖 크루 러닝 일지</h2>
                <div class="box" style="background: white;">
                    <h3>✍️ 기록하기</h3>
                    <div class="input-group">
                        <input type="text" id="logName" placeholder="이름" style="flex:0.3;">
                        <input type="text" id="logDist" placeholder="거리(km)" style="flex:0.3;">
                        <input type="text" id="logPace" placeholder="페이스" style="flex:0.4;">
                    </div>
                    <input type="text" id="logComment" placeholder="한 줄 평" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                    <button onclick="submitLog()" style="width:100%; padding:12px; background:#2c3e50; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">기록 등록</button>
                </div>
                <div id="logList"></div>
            `;
            loadLogs();
        }

        async function submitLog() {
            const name = document.getElementById('logName').value.trim();
            const dist = document.getElementById('logDist').value.trim();
            const pace = document.getElementById('logPace').value.trim();
            const comment = document.getElementById('logComment').value.trim();
            if(!name || !dist) return alert("이름과 거리를 입력해주세요.");

            await fetch(ENDPOINTS.logs, {
                method: 'POST',
                body: JSON.stringify({ name, dist, pace, comment, date: new Date().toLocaleDateString(), timestamp: Date.now() })
            });
            showLog();
        }

        async function loadLogs() {
            const res = await fetch(ENDPOINTS.logs);
            const data = await res.json();
            const listDiv = document.getElementById('logList');
            if(!listDiv) return;
            listDiv.innerHTML = "";
            if(!data) return listDiv.innerHTML = "<p>첫 일지를 남겨보세요!</p>";
            Object.entries(data).reverse().forEach(([id, log]) => {
                const b = document.createElement('div'); b.className = 'box'; b.style.borderLeft = "6px solid #03c75a";
                b.innerHTML = `<strong>${log.name}</strong> (${log.date})<br>🏃‍♂️ ${log.dist} / ${log.pace}<br><i>"${log.comment}"</i>
                               <div style="text-align:right;"><button onclick="deleteLog('${id}')" style="color:red; border:none; background:none; cursor:pointer;">삭제</button></div>`;
                listDiv.appendChild(b);
            });
        }

        async function deleteLog(id) {
            if(confirm("삭제할까요?")) { await fetch(`${DB_BASE}/running_logs/${id}.json`, { method: 'DELETE' }); showLog(); }
        }

        // --- 4. 스케줄 투표 (10일 확장) ---
        function showSchedule() {
            contentDiv.innerHTML = `
                <h2>📅 러닝 스케줄 투표</h2>
                <div class="vote-section">
                    <div id="bestDayAlert" class="best-day">집계 중...</div>
                    <div class="input-group">
                        <input type="text" id="voterName" placeholder="이름 입력">
                        <button onclick="submitSchedule()">투표 제출</button>
                    </div>
                    <p class="info-text">💡 이름만 쓰고 제출하면 투표가 취소됩니다.</p>
                    <div class="date-grid" id="dateGrid"></div>
                </div>
            `;
            renderDateGrid();
            loadSchedule();
        }

        function getNext10Days() {
            const d = []; const l = ['일','월','화','수','목','금','토'];
            for(let i=1; i<=10; i++){
                const target = new Date(); target.setDate(target.getDate()+i);
                d.push(`${target.getMonth()+1}/${target.getDate()}(${l[target.getDay()]})`);
            }
            return d;
        }

        function renderDateGrid() {
            const grid = document.getElementById('dateGrid');
            selectedDates = [];
            grid.innerHTML = "";
            getNext10Days().forEach(date => {
                const item = document.createElement('div');
                item.className = 'date-item';
                item.innerHTML = `<span class="date-label">${date}</span><span class="count" id="count-${date}">0명</span><span class="voter-list" id="list-${date}"></span>`;
                item.onclick = () => {
                    item.classList.toggle('selected');
                    if(selectedDates.includes(date)) selectedDates = selectedDates.filter(d => d !== date);
                    else selectedDates.push(date);
                };
                grid.appendChild(item);
            });
        }

        async function submitSchedule() {
            const name = document.getElementById('voterName').value.trim();
            if(!name) return alert("이름을 입력하세요.");
            const res = await fetch(ENDPOINTS.schedule);
            const data = await res.json();
            if(data) {
                const oldId = Object.keys(data).find(k => data[k].name === name);
                if(oldId) await fetch(`${DB_BASE}/schedule/${oldId}.json`, { method: 'DELETE' });
            }
            if(selectedDates.length > 0) {
                await fetch(ENDPOINTS.schedule, { method: 'POST', body: JSON.stringify({ name, dates: selectedDates }) });
                alert("투표 완료!");
            } else { alert("투표 취소 처리됨."); }
            showSchedule();
        }

        async function loadSchedule() {
            const res = await fetch(ENDPOINTS.schedule);
            const data = await res.json();
            const alertBox = document.getElementById('bestDayAlert');
            if(!data) { alertBox.innerText = "데이터 없음"; return; }
            const results = {};
            getNext10Days().forEach(d => results[d] = []);
            Object.values(data).forEach(v => { if(v.dates) v.dates.forEach(d => { if(results[d]) results[d].push(v.name); })});
            let max = 0, best = "";
            for(const d in results) {
                document.getElementById(`count-${d}`).innerText = `${results[d].length}명`;
                document.getElementById(`list-${d}`).innerText = results[d].join(', ');
                if(results[d].length > max) { max = results[d].length; best = d; }
            }
            alertBox.innerHTML = max > 0 ? `🔥 베스트: ${best} (${max}명)` : "날짜를 골라주세요!";
        }

        // --- 5. 갤러리 ---
        function showGallery() {
            contentDiv.innerHTML = `<h2>📸 갤러리</h2>
                <div class="upload-area"><label for="imgInput" class="upload-label">사진 선택</label>
                <input type="file" id="imgInput" accept="image/*" multiple style="display:none;" onchange="uploadImages(event)"></div>
                <div class="gallery-grid" id="galleryGrid"></div>`;
            loadGallery();
        }

        async function uploadImages(e) {
            for(let f of e.target.files) {
                const r = new FileReader();
                r.onload = (ev) => {
                    const img = new Image();
                    img.onload = async () => {
                        const cvs = document.createElement('canvas');
                        cvs.width = 800; cvs.height = (img.height * 800) / img.width;
                        cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                        await fetch(ENDPOINTS.gallery, { method: 'POST', body: JSON.stringify({ image: cvs.toDataURL('image/jpeg', 0.7), time: Date.now() }) });
                        loadGallery();
                    };
                    img.src = ev.target.result;
                };
                r.readAsDataURL(f);
            }
        }

        async function loadGallery() {
            const res = await fetch(ENDPOINTS.gallery);
            const data = await res.json();
            const grid = document.getElementById('galleryGrid');
            if(!grid) return; grid.innerHTML = "";
            if(!data) return;
            Object.entries(data).reverse().forEach(([id, v]) => {
                const c = document.createElement('div'); c.className = 'gallery-card';
                c.innerHTML = `<img src="${v.image}"><button class="del-btn" onclick="deletePhoto('${id}')">×</button>`;
                grid.appendChild(c);
            });
        }

        async function deletePhoto(id) {
            if(confirm("삭제?")) { await fetch(`${DB_BASE}/gallery/${id}.json`, { method: 'DELETE' }); loadGallery(); }
        }
    </script>
</body>
</html>
