<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도림천 러닝 크루</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; line-height: 1.6; color: #333; }
        .container { display: flex; min-height: 100vh; flex-direction: row; }
        .sidebar { width: 220px; background-color: #2c3e50; color: white; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { border-bottom: 1px solid #555; padding-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin: 20px 0; }
        .sidebar a { color: white; text-decoration: none; font-weight: bold; display: block; padding: 10px 0; }
        .content { flex: 1; padding: 30px; background-color: #ffffff; }
        h2 { font-size: 1.8em; color: #2c3e50; margin-bottom: 10px; }
        h3 { font-size: 1.5em; color: #2c3e50; margin-top: 20px; }

        /* 투표 시스템 스타일 */
        .vote-section { background: #f8f9fa; padding: 25px; border-radius: 15px; border: 1px solid #e9ecef; margin-bottom: 30px; }
        .best-day { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .date-item { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
        .date-item.selected { border-color: #2c3e50; background: #e9ecef; }
        .date-item .count { display: block; font-size: 1.2em; color: #2c3e50; font-weight: bold; }
        
        .name-input-group { margin-bottom: 20px; display: flex; gap: 10px; }
        .name-input-group input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; }
        .name-input-group button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }

        .log-info { font-size: 1.1em; margin: 5px 0; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; box-sizing: border-box; height: auto; }
            .sidebar ul { display: flex; gap: 15px; overflow-x: auto; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="#" onclick="showCourse()">1. 러닝 코스</a></li>
                <li><a href="#" onclick="showFood()">2. 맛집 리스트</a></li>
                <li><a href="#" onclick="showLog()">3. 러닝 일지</a></li>
            </ul>
        </div>
        <div id="content" class="content">
            <h1>🏃‍♂️ 도림천 러닝 크루</h1>
            <p>메뉴를 선택해 주세요.</p>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        
        // ⚠️ 본인의 Firebase URL로 수정하세요.
        const DB_BASE_URL = "https://dorim-run-crew-default-rtdb.firebaseio.com/schedule_votes";

        let selectedDates = [];

        function showCourse() {
            contentDiv.innerHTML = `<h2>🌉 추천 러닝 코스</h2><p>고구마런, 안양천, 도림천 코스가 준비되어 있습니다.</p>`;
        }

        function showFood() {
            contentDiv.innerHTML = `<h2>🍲 맛집 리스트</h2><p>기절초풍왕순대, 체부동 잔치집 등 추천 맛집입니다.</p>`;
        }

        // --- 일정 투표 로직 ---

        function showLog() {
            contentDiv.innerHTML = `
                <h2>📅 러닝 일정 투표</h2>
                <p>이번 주 정기러닝, 언제 뛰면 좋을까요? 가능한 날짜를 모두 선택해 주세요!</p>

                <div class="vote-section">
                    <div id="bestDayAlert" class="best-day">투표 데이터를 불러오는 중...</div>

                    <div class="name-input-group">
                        <input type="text" id="voterName" placeholder="본인 이름 입력">
                        <button onclick="submitVote()">투표하기</button>
                    </div>

                    <div class="date-grid" id="dateGrid"></div>
                    <p style="font-size: 0.8em; color: #666;">* 날짜를 클릭하여 중복 선택이 가능합니다.</p>
                </div>

                <h3>과거 러닝 기록</h3>
                <p class="log-info">제1회 정기러닝 (03.23) - 8km (6:21/km)</p>
                <p class="log-info">번개런 (04.03) - 신림-관악산 (6:30/km)</p>
            `;
            renderDateGrid();
            loadVotes();
        }

        // 오늘 기준으로 7일치 날짜 생성
        function getNext7Days() {
            const days = [];
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            for (let i = 1; i <= 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                const dateStr = `${date.getMonth() + 1}/${date.getDate()}(${dayNames[date.getDay()]})`;
                days.push(dateStr);
            }
            return days;
        }

        function renderDateGrid() {
            const grid = document.getElementById('dateGrid');
            const dates = getNext7Days();
            grid.innerHTML = "";
            dates.forEach(date => {
                const div = document.createElement('div');
                div.className = 'date-item';
                div.id = `date-${date}`;
                div.innerHTML = `<span>${date}</span><span class="count" id="count-${date}">0명</span>`;
                div.onclick = () => toggleDate(date);
                grid.appendChild(div);
            });
        }

        function toggleDate(date) {
            const el = document.getElementById(`date-${date}`);
            if (selectedDates.includes(date)) {
                selectedDates = selectedDates.filter(d => d !== date);
                el.classList.remove('selected');
            } else {
                selectedDates.push(date);
                el.classList.add('selected');
            }
        }

        async function submitVote() {
            const name = document.getElementById('voterName').value.trim();
            if (!name) return alert("이름을 입력해주세요!");
            if (selectedDates.length === 0) return alert("가능한 날짜를 하나 이상 선택해주세요!");

            try {
                await fetch(`${DB_BASE_URL}.json`, {
                    method: 'POST',
                    body: JSON.stringify({ name: name, dates: selectedDates })
                });
                alert("투표가 완료되었습니다!");
                selectedDates = [];
                document.getElementById('voterName').value = "";
                showLog(); // 화면 새로고침
            } catch (e) { alert("투표 실패!"); }
        }

        async function loadVotes() {
            try {
                const response = await fetch(`${DB_BASE_URL}.json`);
                const data = await response.json();
                if (!data) {
                    document.getElementById('bestDayAlert').innerText = "아직 투표 결과가 없습니다.";
                    return;
                }

                const counts = {};
                const next7Days = getNext7Days();
                next7Days.forEach(d => counts[d] = 0);

                Object.values(data).forEach(vote => {
                    vote.dates.forEach(d => {
                        if (counts[d] !== undefined) counts[d]++;
                    });
                });

                let maxCount = 0;
                let bestDay = "";

                next7Days.forEach(d => {
                    const countEl = document.getElementById(`count-${d}`);
                    if (countEl) countEl.innerText = `${counts[d]}명`;
                    
                    if (counts[d] > maxCount) {
                        maxCount = counts[d];
                        bestDay = d;
                    }
                });

                const alertEl = document.getElementById('bestDayAlert');
                if (maxCount > 0) {
                    alertEl.innerHTML = `⭐ 현재 가장 많이 모일 수 있는 날은 <span style="color:#d9480f; font-size:1.2em;">${bestDay}</span> (${maxCount}명) 입니다!`;
                } else {
                    alertEl.innerText = "투표를 통해 최적의 러닝 날짜를 찾아보세요!";
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
