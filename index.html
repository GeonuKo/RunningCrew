<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도림천 러닝 크루</title>
    <style>
        /* 기본 레이아웃 및 디자인 */
        body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.6; color: #333; background-color: #f0f2f5; }
        .container { display: flex; min-height: 100vh; flex-direction: row; }
        
        /* 사이드바 */
        .sidebar { width: 240px; background-color: #2c3e50; color: white; padding: 25px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.4em; border-bottom: 2px solid #34495e; padding-bottom: 15px; margin-bottom: 20px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin-bottom: 10px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; font-weight: 600; display: block; padding: 12px 15px; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover { background-color: #34495e; color: white; }

        /* 메인 콘텐츠 */
        .content { flex: 1; padding: 40px; background-color: #ffffff; min-width: 0; }
        h2 { font-size: 2em; color: #2c3e50; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; border-left: 6px solid #2c3e50; padding-left: 15px; }
        .box { background: #f8f9fa; padding: 25px; border-radius: 15px; border: 1px solid #e9ecef; margin-bottom: 30px; }
        
        /* 투표 시스템 */
        .vote-section { margin-bottom: 40px; }
        .best-day { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 1.1em; color: #856404; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
        .date-item { background: white; border: 2px solid #eee; padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; min-height: 100px; display: flex; flex-direction: column; justify-content: flex-start; }
        .date-item.selected { border-color: #2c3e50; background-color: #e9ecef; }
        .date-item .date-label { font-weight: bold; font-size: 1em; margin-bottom: 5px; }
        .date-item .count { display: block; font-size: 1.1em; color: #2c3e50; font-weight: bold; margin-bottom: 8px; }
        .date-item .voter-list { font-size: 0.75em; color: #666; line-height: 1.3; word-break: keep-all; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; }
        .input-group button { padding: 12px 25px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .info-text { font-size: 0.85em; color: #666; margin-top: 5px; line-height: 1.4; }

        /* 갤러리/기타 공통 */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .gallery-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; aspect-ratio: 1 / 1; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; }
        
        .upload-area { border: 3px dashed #cbd5e0; padding: 40px; text-align: center; border-radius: 20px; background: #edf2f7; margin-bottom: 30px; }
        .upload-label { background: #2c3e50; color: white; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; display: inline-block; }

        .name-tag { background: #e2e8f0; padding: 6px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
        .tag-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .sidebar ul { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
            .sidebar li { margin-bottom: 0; flex-shrink: 0; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>RUN CREW</h2>
            <ul>
                <li><a href="#" onclick="showCourse()">🗺️ 러닝 코스</a></li>
                <li><a href="#" onclick="showFood()">🍲 맛집 리스트</a></li>
                <li><a href="#" onclick="showLog()">📖 러닝 일지</a></li>
                <li><a href="#" onclick="showSchedule()">📅 스케줄 투표</a></li>
                <li><a href="#" onclick="showGallery()">📸 갤러리</a></li>
            </ul>
        </div>

        <div id="content" class="content">
            <h1>🏃‍♂️ 도림천 러닝 크루 관리 시스템</h1>
            <p>메뉴를 클릭하여 크루 활동을 관리하세요.</p>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const DB_BASE = "https://dorim-run-crew-default-rtdb.firebaseio.com";
        const ENDPOINTS = {
            schedule: `${DB_BASE}/schedule_votes.json`,
            fixed: `${DB_BASE}/fixed_attendance.json`,
            gallery: `${DB_BASE}/gallery.json`
        };

        let selectedDates = [];

        // 1~3 페이지 (생략 가능하지만 일관성을 위해 유지)
        function showCourse() {
            contentDiv.innerHTML = `
                <h2>🗺️ 추천 러닝 코스</h2>
                <div class="box"><h3>고구마런 (8.0km)</h3><p>여의나루역 기점 여의도 순환 코스. 지형이 고구마를 닮아 붙여진 이름입니다.</p></div>
                <div class="box"><h3>안양천 코스 (6.0~10.0km)</h3><p>신도림역에서 출발해 안양천 합수부까지 직선으로 뻗은 쾌적한 코스입니다.</p></div>
                <div class="box"><h3>도림천 코스 (6.0km)</h3><p>신림역에서 신도림역까지 물길을 따라가는 평탄한 코스입니다.</p></div>
            `;
        }
        function showFood() {
            contentDiv.innerHTML = `
                <h2>🍲 크루 추천 맛집</h2>
                <div class="box"><h3>기절초풍왕순대</h3><p>📍 관악구 봉천로 62길 2<br>러닝 후 뜨끈한 순대국과 모둠순대는 최고의 보상입니다.</p><a href="https://map.naver.com/p/entry/place/18709584" target="_blank" style="color:#03c75a; font-weight:bold;">네이버 지도 열기</a></div>
                <div class="box"><h3>체부동 잔치집</h3><p>📍 종로구 자하문로1길 16<br>가성비 넘치는 잔치국수와 두툼한 해물파전이 일품입니다.</p><a href="https://map.naver.com/p/entry/place/13156385" target="_blank" style="color:#03c75a; font-weight:bold;">네이버 지도 열기</a></div>
                <div class="box"><h3>원조마늘곱창 문래본점</h3><p>📍 영등포구 경인로79길 17-1<br>풍부한 마늘향이 입혀진 곱창으로 원기 회복하기 좋습니다.</p><a href="https://map.naver.com/p/entry/place/1999481194" target="_blank" style="color:#03c75a; font-weight:bold;">네이버 지도 열기</a></div>
            `;
        }
        function showLog() {
            contentDiv.innerHTML = `
                <h2>📖 과거 러닝 기록</h2>
                <div class="box"><strong>제1회 정기러닝 (2026.03.23)</strong><br>참석: 고건우, 오지완, 김민형, 오동학, 양원아, 김효진<br>기록: 8km / 페이스 6:21/km</div>
                <div class="box"><strong>번개런 (2026.04.03)</strong><br>참석: 양원아, 김효진<br>기록: 5km / 페이스 6:30/km</div>
            `;
        }

        // 4. 스케줄 투표 (이름 리스트 기능 추가됨)
        function showSchedule() {
            contentDiv.innerHTML = `
                <h2>📅 러닝 스케줄 투표</h2>
                <div class="vote-section">
                    <h3>🗓️ 일정 조율 (중복 선택 가능)</h3>
                    <div id="bestDayAlert" class="best-day">투표 데이터를 집계 중입니다...</div>
                    
                    <div class="input-group">
                        <input type="text" id="voterName" placeholder="이름 입력">
                        <button onclick="submitSchedule()">투표 제출</button>
                    </div>
                    <p class="info-text">💡 <b>투표 수정:</b> 이전에 사용한 이름과 동일하게 입력하면 기존 투표가 변경됩니다.</p>

                    <div class="date-grid" id="dateGrid"></div>
                </div>

                <hr style="border:0; border-top:1px solid #eee; margin:40px 0;">

                <div class="vote-section">
                    <h3>✅ 이번 주 확정 일정 참석 투표</h3>
                    <div class="box" style="background:white;">
                        <p><strong>일시:</strong> 2026.05.08(금) 20:00 / <strong>코스:</strong> 고구마런</p>
                        <div class="input-group">
                            <input type="text" id="fixedName" placeholder="참석자 이름">
                            <button onclick="submitFixed()" style="background:#03c75a;">참석 확정</button>
                        </div>
                        <div class="tag-container" id="fixedList"></div>
                    </div>
                </div>
            `;
            renderDateGrid();
            loadSchedule();
            loadFixed();
        }

        function getNext7Days() {
            const days = [];
            const labels = ['일', '월', '화', '수', '목', '금', '토'];
            for (let i = 1; i <= 7; i++) {
                const d = new Date(); d.setDate(d.getDate() + i);
                days.push(`${d.getMonth() + 1}/${d.getDate()}(${labels[d.getDay()]})`);
            }
            return days;
        }

        function renderDateGrid() {
            const grid = document.getElementById('dateGrid');
            selectedDates = [];
            getNext7Days().forEach(date => {
                const item = document.createElement('div');
                item.className = 'date-item';
                item.id = `item-${date}`;
                item.innerHTML = `
                    <span class="date-label">${date}</span>
                    <span class="count" id="count-${date}">0명</span>
                    <span class="voter-list" id="list-${date}"></span>
                `;
                item.onclick = () => {
                    item.classList.toggle('selected');
                    if(selectedDates.includes(date)) selectedDates = selectedDates.filter(d => d !== date);
                    else selectedDates.push(date);
                };
                grid.appendChild(item);
            });
        }

        async function submitSchedule() {
            const name = document.getElementById('voterName').value.trim();
            if(!name || selectedDates.length === 0) return alert("이름을 입력하고 날짜를 선택해주세요.");

            try {
                const response = await fetch(ENDPOINTS.schedule);
                const data = await response.json();
                let existingId = data ? Object.keys(data).find(key => data[key].name === name) : null;

                if (existingId) {
                    if (!confirm(`'${name}'님으로 이미 투표한 기록이 있습니다. 수정하시겠습니까?`)) return;
                    await fetch(`${DB_BASE}/schedule_votes/${existingId}.json`, { method: 'DELETE' });
                }

                await fetch(ENDPOINTS.schedule, { 
                    method: 'POST', 
                    body: JSON.stringify({ name, dates: selectedDates, timestamp: new Date().getTime() }) 
                });
                
                alert(existingId ? "투표가 수정되었습니다!" : "투표가 완료되었습니다!");
                showSchedule();
            } catch (e) { alert("연결 오류가 발생했습니다."); }
        }

        async function loadSchedule() {
            const res = await fetch(ENDPOINTS.schedule);
            const data = await res.json();
            if(!data) { document.getElementById('bestDayAlert').innerText = "현재 투표가 없습니다."; return; }
            
            const dayData = {}; // 날짜별 인원수와 이름 리스트 저장
            getNext7Days().forEach(d => dayData[d] = { count: 0, names: [] });

            Object.values(data).forEach(v => {
                v.dates.forEach(d => {
                    if(dayData[d]) {
                        dayData[d].count++;
                        dayData[d].names.push(v.name);
                    }
                });
            });

            let max = 0, best = "";
            for(const d in dayData) {
                const countEl = document.getElementById(`count-${d}`);
                const listEl = document.getElementById(`list-${d}`);
                
                if(countEl) countEl.innerText = `${dayData[d].count}명`;
                if(listEl) listEl.innerText = dayData[d].names.join(', ');
                
                if(dayData[d].count > max) { max = dayData[d].count; best = d; }
            }
            document.getElementById('bestDayAlert').innerHTML = max > 0 ? `🔥 베스트 매칭: <strong>${best}</strong> (${max}명 참여 가능)` : "참여 가능한 날을 골라주세요!";
        }

        // 확정 참석/갤러리 등 나머지 로직은 이전과 동일
        async function submitFixed() {
            const name = document.getElementById('fixedName').value.trim();
            if(!name) return alert("이름을 입력하세요.");
            await fetch(ENDPOINTS.fixed, { method: 'POST', body: JSON.stringify({ name }) });
            showSchedule();
        }
        async function loadFixed() {
            const res = await fetch(ENDPOINTS.fixed);
            const data = await res.json();
            const container = document.getElementById('fixedList');
            if(!container) return;
            container.innerHTML = "";
            if(!data) { container.innerHTML = "<span style='color:#999'>아직 참석자가 없습니다.</span>"; return; }
            Object.entries(data).forEach(([id, v]) => {
                const tag = document.createElement('span'); tag.className = 'name-tag';
                tag.innerHTML = `${v.name} <button class="del-btn" style="position:static; width:18px; height:18px; font-size:10px;" onclick="deleteFixed('${id}')">x</button>`;
                container.appendChild(tag);
            });
        }
        async function deleteFixed(id) { if(confirm("취소하시겠습니까?")) { await fetch(`${DB_BASE}/fixed_attendance/${id}.json`, { method: 'DELETE' }); showSchedule(); } }
        function showGallery() { contentDiv.innerHTML = `<h2>📸 크루 갤러리</h2><div class="upload-area"><label for="imgInput" class="upload-label">사진 선택</label><input type="file" id="imgInput" accept="image/*" multiple style="display:none;" onchange="uploadImages(event)"></div><div class="gallery-grid" id="galleryGrid"></div>`; loadGallery(); }
        async function uploadImages(e) { for(let f of e.target.files) { const r = new FileReader(); r.onload = async (ev) => { await fetch(ENDPOINTS.gallery, { method: 'POST', body: JSON.stringify({ image: ev.target.result, time: new Date().getTime() }) }); loadGallery(); }; r.readAsDataURL(f); } }
        async function loadGallery() { const res = await fetch(ENDPOINTS.gallery); const data = await res.json(); const grid = document.getElementById('galleryGrid'); if(!grid) return; grid.innerHTML = ""; if(!data) return; Object.entries(data).reverse().forEach(([id, v]) => { const card = document.createElement('div'); card.className = 'gallery-card'; card.innerHTML = `<img src="${v.image}"><button class="del-btn" onclick="deletePhoto('${id}')">×</button>`; grid.appendChild(card); }); }
        async function deletePhoto(id) { if(confirm("삭제하시겠습니까?")) { await fetch(`${DB_BASE}/gallery/${id}.json`, { method: 'DELETE' }); loadGallery(); } }
    </script>
</body>
</html>
